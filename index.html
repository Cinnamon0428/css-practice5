<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Panel</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>

<div class="panel">

    <div class="pricing-plan">
        <img src="icons/icon1.png" alt="">
        <h2>Basic</h2>
        <p class="price">$10</p>
        <ul>
            <li>10 Projects</li>
            <li>5 GB Storage</li>
            <li>Email Support</li>
        </ul>
        <button>Sign Up</button>
    </div>

    <div class="pricing-plan">
        <img src="icons/icon2.png" alt="">
        <h2>Standard</h2>
        <p class="price">$20</p>
        <ul>
            <li>20 Projects</li>
            <li>15 GB Storage</li>
            <li>Priority Support</li>
        </ul>
        <button>Sign Up</button>
    </div>

    <div class="pricing-plan">
        <img src="icons/icon3.png" alt="">
        <h2>Premium</h2>
        <p class="price">$30</p>
        <ul>
            <li>Unlimited Projects</li>
            <li>50 GB Storage</li>
            <li>24/7 Support</li>
        </ul>
        <button>Sign Up</button>
    </div>

</div>

</body>
</html>
